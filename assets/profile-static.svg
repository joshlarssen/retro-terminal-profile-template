<svg width="1200" height="940" viewBox="0 0 1200 940" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="940" gradientUnits="userSpaceOnUse">
              <stop stop-color="#02070b" />
              <stop offset="1" stop-color="#051018" />
            </linearGradient>
            <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse">
              <rect width="6" height="3" fill="#6de7ff" opacity="0.08" />
